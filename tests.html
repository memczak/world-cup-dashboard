<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup Dashboard — Test Suite</title>
<style>
  body{background:#0b0f14;color:#e7edf5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;margin:0;padding:24px;line-height:1.5;}
  .wrap{max-width:820px;margin:0 auto;}
  h1{font-size:20px;margin:0 0 4px;} .sub{color:#8a98ac;font-size:13px;margin:0 0 18px;}
  .summary{font-size:15px;font-weight:700;padding:12px 16px;border-radius:12px;margin:14px 0;border:1px solid #243044;}
  .summary.pass{background:rgba(0,211,167,.12);color:#00d3a7;} .summary.fail{background:rgba(255,77,94,.12);color:#ff4d5e;}
  .t{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border:1px solid #243044;border-radius:10px;margin-bottom:7px;background:#161e2a;}
  .t .ic{width:20px;height:20px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;}
  .ic.ok{background:rgba(0,211,167,.16);color:#00d3a7;} .ic.bad{background:rgba(255,77,94,.16);color:#ff4d5e;}
  .t .nm{font-weight:600;font-size:14px;} .t .er{color:#ff4d5e;font-size:12px;margin-top:3px;font-family:ui-monospace,monospace;}
  .grp{color:#8a98ac;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin:20px 0 8px;}
  button{background:#00d3a7;color:#04211b;border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:14px;cursor:pointer;margin:6px 0 14px;}
  a{color:#00d3a7;}
</style>
</head>
<body>
<div class="wrap">
  <h1>⚽ World Cup Dashboard — Test Suite</h1>
  <p class="sub">Unit tests over the shared engine's pure logic (offline), plus an optional live-data integration check. Open this after any change to confirm stability.</p>
  <div id="summary" class="summary">Running…</div>
  <div id="results"></div>
  <div class="grp">Integration (live ESPN)</div>
  <button id="liveBtn">▶ Run live data check</button>
  <div id="live"></div>
  <p class="sub" style="margin-top:18px"><a href="index.html">← desktop app</a> · <a href="mobile.html">mobile app</a></p>
</div>

<script src="wc-engine.js"></script>
<script>
/* ---- tiny assert framework ---- */
const RESULTS = [];
function test(group, name, fn){ try { fn(); RESULTS.push({group, name, ok:true}); } catch(e){ RESULTS.push({group, name, ok:false, msg:e.message}); } }
function eq(a, b, m){ if(JSON.stringify(a)!==JSON.stringify(b)) throw new Error(`${m||""} — expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`); }
function ok(c, m){ if(!c) throw new Error(m||"expected truthy"); }

/* ======================= UNIT TESTS (offline) ======================= */

test("Dates", "toDate parses bare timestamp as UTC", ()=>{
  const d = toDate("2026-06-11T19:00:00");
  ok(d instanceof Date && !isNaN(d), "valid Date");
  eq(d.getUTCHours(), 19, "treated as UTC, not local");
});
test("Dates", "TS returns 0 for empty", ()=> eq(TS(""), 0));
test("Dates", "TS is monotonic", ()=> ok(TS("2026-06-12T00:00:00") > TS("2026-06-11T00:00:00")));

test("ESPN", "normalizeEspn maps a finished match", ()=>{
  const ev = { id:"1", date:"2026-06-11T19:00Z", status:{type:{state:"post"}},
    competitions:[{ competitors:[
      {homeAway:"home", team:{displayName:"Mexico", logo:"L"}, score:"2"},
      {homeAway:"away", team:{displayName:"South Africa"}, score:"0"} ],
      venue:{fullName:"Azteca", address:{country:"Mexico"}} }] };
  const m = normalizeEspn(ev);
  eq(m.home, "Mexico"); eq(m.away, "South Africa");
  eq(m.hs, 2); eq(m.as, 0); eq(m.status, "ft");
  eq(m.venue, "Azteca"); eq(m.country, "Mexico"); eq(m.homeBadge, "L");
});
test("ESPN", "normalizeEspn forces null scores for upcoming matches", ()=>{
  const ev = { id:"2", date:"2026-06-30T19:00Z", status:{type:{state:"pre"}},
    competitions:[{ competitors:[
      {homeAway:"home", team:{displayName:"A"}, score:"0"},
      {homeAway:"away", team:{displayName:"B"}, score:"0"} ], venue:{} }] };
  const m = normalizeEspn(ev);
  eq(m.status, "up"); eq(m.hs, null); eq(m.as, null);
});
test("ESPN", "espnNum parses percentages and counts", ()=>{ eq(espnNum("60.5%"), 60.5); eq(espnNum("16"), 16); eq(espnNum(null), 0); });

test("Matching", "teamsMatch handles real cross-source aliases", ()=>{
  ok(teamsMatch("USA","United States"), "USA");
  ok(teamsMatch("South Korea","Korea Republic"), "Korea");
  ok(teamsMatch("Czech Republic","Czechia"), "Czechia");
  ok(!teamsMatch("Mexico","South Africa"), "distinct teams must not match");
});

test("Lineups", "tierOf classifies positions into pitch rows", ()=>{
  eq(tierOf("G"), 0); eq(tierOf("CD-L"), 1); eq(tierOf("DM"), 2);
  eq(tierOf("CM-R"), 3); eq(tierOf("AM"), 4); eq(tierOf("F"), 5);
});
test("Lineups", "pitchPlayers places all 11 starters", ()=>{
  const pos = ["G","RB","CD-R","CD-L","LB","DM","RM","CM-R","CM-L","LM","F"];
  const roster = pos.map((p,i)=>({ starter:true, jersey:i+1, position:{abbreviation:p}, athlete:{displayName:"P"+i} }));
  roster.push({ starter:false, jersey:12, position:{abbreviation:"F"}, athlete:{displayName:"sub"} });
  const placed = pitchPlayers(roster, true);
  eq(placed.length, 11, "exactly 11 on the pitch");
  ok(placed.every(p=> p.left>=0 && p.left<=100 && p.top>=0 && p.top<=100), "all within bounds");
  ok(placed[0].top > 80, "home GK sits near the bottom");
});

test("Players", "ageFrom computes a sane age", ()=>{
  const a = ageFrom("1991-05-05");
  ok(a >= 30 && a < 120, "age in plausible range, got "+a);
  eq(ageFrom(""), null);
});

test("UI helpers", "crest falls back to initials when no badge", ()=>{
  TEAM_BADGE = {};
  const html = crest("Germany");
  ok(html.includes("GER"), "shows initials");
});
test("UI helpers", "isFav is case-insensitive", ()=>{ fav = "Brazil"; ok(isFav("brazil")); ok(!isFav("Argentina")); fav=""; });

test("Match stats", "espnStatsHTML renders a comparison", ()=>{
  const sum = { boxscore:{ teams:[
    { team:{displayName:"Mexico"}, statistics:[{name:"possessionPct",displayValue:"60.5"},{name:"totalShots",displayValue:"16"}] },
    { team:{displayName:"South Africa"}, statistics:[{name:"possessionPct",displayValue:"39.5"},{name:"totalShots",displayValue:"3"}] }
  ]}};
  const html = espnStatsHTML(sum);
  ok(html.includes("Possession") && html.includes("60.5%") && html.includes("Shots"), "stat rows present");
});

/* ---- invariants: the same checks the Verify tab runs ---- */
function validGroups(){
  const g = [];
  for(let i=0;i<12;i++) g.push({ letter:String.fromCharCode(65+i), matches:[],
    teams:[0,1,2,3].map(j=>({team:`T${i}_${j}`, P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0})) });
  return g;
}
test("Invariants", "valid data passes every integrity check", ()=>{
  GROUPS = validGroups(); FIXTURES = [{home:"T0_0",away:"T0_1",hs:0,as:0,status:"ft"}]; SCORERS = [];
  const inv = runInvariants();
  ok(inv.every(c=>c.pass), "all pass: " + inv.filter(c=>!c.pass).map(c=>c.name).join(", "));
});
test("Invariants", "corrupted standings are caught", ()=>{
  GROUPS = validGroups(); GROUPS[0].teams[0].Pts = 99;   // Pts != 3W+D
  FIXTURES = [{home:"T0_0",away:"T0_1",hs:0,as:0,status:"ft"}]; SCORERS = [];
  const inv = runInvariants();
  ok(inv.some(c=>!c.pass), "a check must fail on bad data");
});
test("ESPN", "normalizeEspn tags knockout stage from season.slug", ()=>{
  const ev = { id:"k1", date:"2026-06-28T19:00Z", season:{slug:"round-of-32"}, status:{type:{state:"pre"}},
    competitions:[{ competitors:[{homeAway:"home",team:{displayName:"A"},score:"0"},{homeAway:"away",team:{displayName:"B"},score:"0"}], venue:{} }] };
  const m = normalizeEspn(ev);
  eq(m.knockout, true); eq(m.stage, "Round of 32"); ok(m.stageOrder > 0, "ordered after groups");
});
test("ESPN", "normalizeEspn tags group stage as non-knockout", ()=>{
  const ev = { id:"g1", date:"2026-06-11T19:00Z", season:{slug:"group-stage"}, status:{type:{state:"post"}},
    competitions:[{ competitors:[{homeAway:"home",team:{displayName:"A"},score:"2"},{homeAway:"away",team:{displayName:"B"},score:"0"}], venue:{} }] };
  eq(normalizeEspn(ev).knockout, false);
});
test("ESPN", "espnRosterPlayers extracts goals + cards with real names", ()=>{
  const sum = { rosters:[{ team:{displayName:"Mexico"}, roster:[
    { starter:true, jersey:9, position:{abbreviation:"F"}, athlete:{id:"1", displayName:"Striker"},
      stats:[{name:"totalGoals",value:2},{name:"yellowCards",value:1},{name:"redCards",value:0}] }
  ]}]};
  const p = espnRosterPlayers(sum)[0];
  eq(p.name, "Striker"); eq(p.team, "Mexico"); eq(p.goals, 2); eq(p.yc, 1);
});

/* ---- render results ---- */
(function render(){
  const pass = RESULTS.filter(r=>r.ok).length, total = RESULTS.length;
  const s = document.getElementById("summary");
  s.className = "summary " + (pass===total ? "pass" : "fail");
  s.textContent = `${pass}/${total} tests passing` + (pass===total ? "  ✓ engine logic verified" : "  ✕ FAILURES — see below");
  const groups = [...new Set(RESULTS.map(r=>r.group))];
  document.getElementById("results").innerHTML = groups.map(g=>
    `<div class="grp">${g}</div>` + RESULTS.filter(r=>r.group===g).map(r=>
      `<div class="t"><div class="ic ${r.ok?'ok':'bad'}">${r.ok?'✓':'✕'}</div>
        <div><div class="nm">${r.name}</div>${r.ok?'':`<div class="er">${r.msg}</div>`}</div></div>`).join("")
  ).join("");
})();

/* ======================= LIVE INTEGRATION CHECK ======================= */
document.getElementById("liveBtn").onclick = async ()=>{
  const out = document.getElementById("live");
  out.innerHTML = `<div class="t"><div class="ic ok">…</div><div class="nm">Fetching live ESPN data…</div></div>`;
  const checks = [];
  try {
    await loadData();   // real ESPN fetch (fixtures + standings)
    checks.push(["Fixtures loaded", FIXTURES.length > 50, `${FIXTURES.length} fixtures`]);
    checks.push(["12 groups", GROUPS.length === 12, `${GROUPS.length} groups`]);
    const teams = new Set(GROUPS.flatMap(g=>g.teams.map(t=>t.team)));
    checks.push(["48 teams", teams.size === 48, `${teams.size} teams`]);
    checks.push(["Germany present", teams.has("Germany"), teams.has("Germany") ? "in Group "+TEAM_OF_GROUP["Germany"] : "MISSING"]);
    const inv = runInvariants();
    checks.push(["All integrity checks pass", inv.every(c=>c.pass), `${inv.filter(c=>c.pass).length}/${inv.length}`]);
  } catch(e){ checks.push(["Reach ESPN", false, e.message]); }
  out.innerHTML = checks.map(([n,okk,d])=>
    `<div class="t"><div class="ic ${okk?'ok':'bad'}">${okk?'✓':'✕'}</div><div><div class="nm">${n}</div><div class="er" style="color:#8a98ac">${d}</div></div></div>`).join("");
};
</script>
</body>
</html>
