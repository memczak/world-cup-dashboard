<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://site.api.espn.com https://sports.core.api.espn.com https://www.thesportsdb.com; font-src 'self'; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" />
<meta name="referrer" content="no-referrer" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>World Cup 2026</title>
<meta name="description" content="A fast, keyless World Cup 2026 dashboard for your phone — live scores, official groups & standings, knockout bracket, top scorers, player profiles and stats. Real data only." />
<meta property="og:title" content="World Cup 2026" />
<meta property="og:description" content="Live scores, groups, knockout bracket, top scorers & stats for the 2026 World Cup. Keyless, installable, works offline." />
<meta property="og:type" content="website" />
<meta property="og:image" content="https://memczak.github.io/world-cup-dashboard/icon-512.png" />
<meta property="og:url" content="https://memczak.github.io/world-cup-dashboard/mobile.html" />
<meta name="twitter:card" content="summary" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0b0f14" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="World Cup" />
<link rel="apple-touch-icon" href="icon-180.png" />
<style>
  :root{
    --bg:#0b0f14; --bg-soft:#121822; --card:#161e2a; --card-hover:#1c2636; --line:#243044;
    --text:#e7edf5; --muted:#8a98ac; --accent:#00d3a7; --accent-2:#ffd23f; --live:#ff4d5e; --fav:#ffd23f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text); overscroll-behavior-y:none;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.45;
  }
  /* header */
  header{position:sticky;top:0;z-index:30;background:rgba(11,15,20,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); padding:max(10px,env(safe-area-inset-top)) 14px 10px;
    display:flex;align-items:center;gap:10px;}
  .ball{width:30px;height:30px;flex:none;object-fit:contain;}
  header h1{font-size:16px;margin:0;font-weight:800;letter-spacing:.2px;}
  header .sp{flex:1;}
  .icon-btn{background:var(--card);border:1px solid var(--line);color:var(--text);width:36px;height:36px;
    border-radius:50%;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .icon-btn.on{color:var(--accent-2);border-color:var(--accent-2);}
  /* views */
  main{padding:14px 14px calc(78px + env(safe-area-inset-bottom));min-height:60vh;}
  .view{display:none;animation:fade .2s ease;}
  .view.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .h{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin:6px 0 10px;}
  /* segmented control */
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:3px;margin-bottom:14px;}
  .seg button{flex:1;background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;padding:9px;border-radius:9px;cursor:pointer;}
  .seg button.on{background:var(--accent);color:#04211b;}
  /* next-match hero */
  .nm{background:linear-gradient(135deg,rgba(0,211,167,.14),rgba(255,210,63,.06)),var(--card);
    border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;}
  .nm .lab{font-size:11px;color:var(--accent-2);text-transform:uppercase;letter-spacing:1.4px;font-weight:700;}
  .nm .mt{font-size:17px;font-weight:700;margin:6px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .nm .meta{font-size:12px;color:var(--muted);}
  .cd{display:flex;gap:8px;margin-top:12px;}
  .cd .u{flex:1;text-align:center;background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;padding:8px 0;}
  .cd .u b{font-size:20px;font-variant-numeric:tabular-nums;}
  .cd .u span{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  /* match row card */
  .mrow{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;cursor:pointer;}
  .mrow:active{background:var(--card-hover);}
  .mrow .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .mrow .lg{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
  .pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;}
  .pill.live{background:rgba(255,77,94,.16);color:var(--live);} .pill.ft{background:rgba(138,152,172,.16);color:var(--muted);} .pill.up{background:rgba(0,211,167,.14);color:var(--accent);}
  .side{display:flex;align-items:center;gap:10px;padding:5px 0;}
  .side .crest{width:24px;height:18px;}
  .side .nm2{font-weight:600;font-size:15px;} .side .sc{margin-left:auto;font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;}
  .side.win .nm2{color:var(--accent);} .side.fav .nm2{color:var(--fav);}
  .mrow .when{font-size:11px;color:var(--muted);margin-top:6px;}
  .day-h{font-size:12px;font-weight:700;color:var(--accent-2);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;}
  /* group card */
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;}
  .gcard h3{margin:0 0 8px;font-size:15px;}
  table{width:100%;border-collapse:collapse;}
  th{font-size:9px;color:var(--muted);text-transform:uppercase;padding:3px 4px;font-weight:600;}
  td{font-size:13px;padding:7px 4px;border-top:1px solid var(--line);text-align:center;font-variant-numeric:tabular-nums;}
  td.l{text-align:left;} .tname{display:flex;align-items:center;gap:7px;}
  tr.q1 td:first-child{box-shadow:inset 3px 0 0 var(--accent);} tr.q3 td:first-child{box-shadow:inset 3px 0 0 var(--accent-2);}
  tr.favr td{background:rgba(255,210,63,.06);} .pts{font-weight:800;}
  /* tiles */
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;}
  .tile b{font-size:24px;font-weight:800;display:block;} .tile span{font-size:11px;color:var(--muted);}
  .mbars{display:flex;align-items:flex-end;gap:7px;height:104px;padding-top:6px;}
  .mb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;justify-content:flex-end;}
  .mb .mbar{width:100%;background:linear-gradient(180deg,var(--accent),#0a7a63);border-radius:5px 5px 0 0;min-height:2px;}
  .mb .mn{font-size:10px;font-weight:700;} .mb .ml{font-size:9px;color:var(--muted);}
  /* scorer / player rows */
  .lrow{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:9px;cursor:pointer;}
  .lrow:active{background:var(--card-hover);}
  .lrow .ph{width:42px;height:42px;border-radius:50%;object-fit:cover;background:var(--bg-soft);border:1px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);}
  .lrow .nm3{font-weight:700;font-size:15px;} .lrow .sub{font-size:12px;color:var(--muted);margin-top:1px;}
  .lrow .rt{margin-left:auto;font-weight:800;font-size:15px;}
  .lrow .rk{width:18px;text-align:center;color:var(--muted);font-weight:800;font-variant-numeric:tabular-nums;}
  .tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;margin-left:6px;}
  .tag.g{background:rgba(0,211,167,.15);color:var(--accent);} .tag.r{background:rgba(255,77,94,.16);color:var(--live);} .tag.y{background:rgba(255,210,63,.16);color:var(--accent-2);}
  .search{width:100%;background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:11px 14px;font-size:15px;outline:none;margin-bottom:12px;}
  /* checks */
  .chk{display:flex;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;}
  .chk .ic{width:22px;height:22px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;}
  .ic.ok{background:rgba(0,211,167,.15);color:var(--accent);} .ic.bad{background:rgba(255,77,94,.15);color:var(--live);} .ic.warn{background:rgba(255,210,63,.16);color:var(--accent-2);}
  .chk .cn{font-weight:600;font-size:14px;} .chk .cd2{font-size:12px;color:var(--muted);margin-top:2px;}
  .btn{background:var(--accent);color:#04211b;border:none;border-radius:12px;padding:12px 16px;font-weight:700;font-size:14px;width:100%;cursor:pointer;margin:4px 0 14px;}
  .xr{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:9px 4px;border-top:1px solid var(--line);}
  .xr .ag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;} .ag.y2{background:rgba(0,211,167,.15);color:var(--accent);} .ag.n2{background:rgba(255,77,94,.15);color:var(--live);}
  .raw a{display:block;font-size:12px;padding:7px 0;word-break:break-all;}
  .empty{color:var(--muted);text-align:center;padding:30px;border:1px dashed var(--line);border-radius:14px;}
  .skel{height:84px;border-radius:14px;margin-bottom:12px;background:linear-gradient(90deg,var(--card) 25%,var(--card-hover) 50%,var(--card) 75%);background-size:200% 100%;animation:sh 1.2s linear infinite;}
  @keyframes sh{to{background-position:-200% 0;}}
  .fresh{display:none;font-size:12px;color:#0b0f14;background:var(--accent-2);text-align:center;padding:6px 12px;font-weight:600;}
  .fresh.show{display:block;}
  .cal-btn{background:var(--card-hover);border:1px solid var(--line);color:var(--accent);font:600 12px inherit;padding:6px 11px;border-radius:9px;cursor:pointer;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){ .skel{animation:none;} *{animation-duration:.001ms !important;transition-duration:.001ms !important;} }
  .note{color:var(--muted);font-size:11px;text-align:center;margin-top:10px;}
  a{color:var(--accent);}
  /* bottom tab bar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;
    background:rgba(11,15,20,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);}
  .tabbar button{flex:1;background:none;border:none;color:var(--muted);padding:9px 0 8px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;}
  .tabbar button .i{font-size:19px;line-height:1;}
  .tabbar button.on{color:var(--accent);}
  /* bottom sheet modal */
  .sheet-bg{position:fixed;inset:0;z-index:60;background:rgba(4,8,12,.6);backdrop-filter:blur(3px);display:none;}
  .sheet-bg.show{display:block;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--card);border:1px solid var(--line);
    border-radius:20px 20px 0 0;max-height:92vh;display:flex;flex-direction:column;
    transform:translateY(100%);transition:transform .25s ease;}
  .sheet.show{transform:translateY(0);}
  .sheet .grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:9px auto 4px;flex:none;}
  .sheet .sh-head{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 12px;border-bottom:1px solid var(--line);}
  .sheet .sh-head b{font-size:15px;} .sheet .x{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;}
  .sheet .sh-body{overflow-y:auto;padding:16px calc(16px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) 16px;-webkit-overflow-scrolling:touch;}
  .score-big{display:flex;align-items:center;justify-content:center;gap:18px;font-size:30px;font-weight:800;margin:2px 0 14px;font-variant-numeric:tabular-nums;}
  .score-big .t{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:13px;font-weight:600;text-align:center;}
  .score-big .t .crest{width:36px;height:26px;} .score-big .vs{color:var(--muted);font-size:17px;}
  .drow{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-top:1px solid var(--line);font-size:13px;color:var(--muted);}
  .drow span:last-child{color:var(--text);text-align:right;}
  .plink{color:var(--accent);}
  /* reused ESPN pitch/stat classes (engine returns this markup) */
  .espn-sec h5{margin:16px 0 6px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .espn-credit{font-size:11px;color:var(--muted);margin-top:12px;text-align:center;}
  .espn-load{font-size:13px;color:var(--muted);padding:14px;text-align:center;}
  .pitch{position:relative;width:100%;height:480px;border-radius:14px;overflow:hidden;margin:6px 0 14px;background:repeating-linear-gradient(0deg,#1f7a44 0 48px,#1c6f3d 48px 96px);border:1px solid var(--line);}
  .pitch::before{content:"";position:absolute;left:8px;right:8px;top:50%;height:2px;background:rgba(255,255,255,.3);}
  .pitch::after{content:"";position:absolute;left:50%;top:50%;width:80px;height:80px;border:2px solid rgba(255,255,255,.3);border-radius:50%;transform:translate(-50%,-50%);}
  .pitch-label{position:absolute;left:10px;font-size:11px;font-weight:700;color:rgba(255,255,255,.92);text-transform:uppercase;letter-spacing:.5px;z-index:2;text-shadow:0 1px 2px rgba(0,0,0,.5);}
  .pitch-label.top{top:8px;} .pitch-label.bot{bottom:8px;}
  .pchip{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:2px;width:56px;z-index:3;}
  .pchip .num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;border:2px solid rgba(255,255,255,.85);}
  .pchip.h .num{background:#0bb88f;} .pchip.a .num{background:#3a6df0;}
  .pchip .nm{font-size:9px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.7);white-space:nowrap;max-width:58px;overflow:hidden;text-overflow:ellipsis;text-align:center;}
  .lineup-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:6px 0;}
  .subs h6{margin:0 0 6px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .subrow{font-size:12px;padding:3px 0;display:flex;gap:7px;} .subrow .n{color:var(--muted);min-width:20px;text-align:right;}
  .stat-legend{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin:4px 0 12px;}
  .stat-legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin:0 5px;vertical-align:middle;}
  .sblock{margin:9px 0;} .slabel{text-align:center;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
  .sbar{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;gap:9px;}
  .sbar .hv{text-align:right;font-weight:700;font-size:13px;} .sbar .av{text-align:left;font-weight:700;font-size:13px;}
  .sbar .track{display:flex;height:7px;border-radius:4px;overflow:hidden;background:var(--bg-soft);}
  .sbar .th{background:#0bb88f;} .sbar .ta{background:#3a6df0;margin-left:auto;}
  .facts{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:14px 0;}
  .facts .f{background:var(--card);padding:10px 12px;} .facts .f .k{font-size:10px;color:var(--muted);text-transform:uppercase;} .facts .f .v{font-size:14px;font-weight:600;margin-top:2px;}
  .pm-hero{display:flex;gap:14px;align-items:center;} .pm-hero .ph{width:74px;height:74px;border-radius:16px;object-fit:cover;background:var(--bg-soft);border:1px solid var(--line);}
  .pm-hero .pn{font-size:19px;font-weight:800;} .pm-hero .ps{font-size:13px;color:var(--muted);margin-top:3px;}
  .pm-bio{font-size:13px;color:var(--muted);line-height:1.55;max-height:120px;overflow:auto;}
  .pm-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;} .pm-links a{background:var(--bg-soft);border:1px solid var(--line);color:var(--text);text-decoration:none;padding:8px 13px;border-radius:999px;font-size:12px;font-weight:600;}
  .crest{width:24px;height:18px;object-fit:contain;border-radius:3px;background:var(--bg-soft);vertical-align:middle;}
  .crest.fallback{display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:var(--muted);border:1px solid var(--line);}
  .tcell{display:inline-flex;align-items:center;gap:7px;vertical-align:middle;}
</style>
</head>
<body>
<header>
  <img class="ball" src="ball.png" alt="vintage football" />
  <h1>World Cup 2026</h1>
  <div class="sp"></div>
  <button class="icon-btn" id="favBtn" title="My team">★</button>
  <button class="icon-btn" id="notifyBtn" title="Match alerts" aria-pressed="false" hidden>🔔</button>
  <button class="icon-btn" id="refBtn" title="Refresh">↻</button>
</header>
<div id="freshness" class="fresh" role="status" aria-live="polite"></div>
<datalist id="teamlist"></datalist>   <!-- options for the My Team selector -->


<main id="main">
  <div class="view active" id="v-matches"></div>
  <div class="view" id="v-groups"></div>
  <div class="view" id="v-stats"></div>
  <div class="view" id="v-players"></div>
  <div class="view" id="v-verify"></div>
</main>

<nav class="tabbar" id="tabbar">
  <button class="on" data-tab="matches"><span class="i">⚽</span>Matches</button>
  <button data-tab="groups"><span class="i">▦</span>Groups</button>
  <button data-tab="stats"><span class="i">📊</span>Stats</button>
  <button data-tab="players"><span class="i">◍</span>Players</button>
  <button data-tab="verify"><span class="i">✓</span>Verify</button>
</nav>

<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
  <div class="grab"></div>
  <div class="sh-head"><b id="sheetTitle">Details</b><button class="x" id="sheetClose" type="button" aria-label="Close">✕</button></div>
  <div class="sh-body" id="sheetBody"></div>
</div>

<script src="wc-engine.js"></script>
<script src="app.mobile.js"></script>
</body>
</html>
